<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora de Offsets</title>

    <link rel="manifest" href="manifest.json">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, Helvetica, sans-serif;

            background:
                linear-gradient(135deg, #00152e, #004b8d);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            color: white;

        }

        .container {

            width: 100%;

            max-width: 1100px;

            background:
                rgba(5, 15, 35, 0.96);

            border-radius: 30px;

            padding: 35px;

            border: 2px solid rgba(0, 180, 255, 0.2);

            box-shadow:
                0 0 40px rgba(0, 150, 255, 0.35);

        }

        .logo {

            display: block;

            margin: auto;

            width: 500px;

            max-width: 90%;

            margin-bottom: 25px;

            filter:
                drop-shadow(0 0 15px rgba(0,200,255,0.7));

        }

        h1 {

            text-align: center;

            font-size: 55px;

            margin-bottom: 40px;

            color: #66d9ff;

            letter-spacing: 3px;

            text-shadow:
                0 0 20px rgba(0,200,255,0.7);

        }

        table {

            width: 100%;

            border-spacing: 20px;

        }

        th {

            color: #78dcff;

            font-size: 35px;

        }

        .row-label {

            width: 240px;

            background:
                rgba(0, 30, 60, 0.8);

            border-radius: 20px;

            text-align: center;

            font-size: 28px;

            font-weight: bold;

            color: #7fe8ff;

            border: 2px solid rgba(0, 180, 255, 0.2);

            box-shadow:
                0 0 15px rgba(0,150,255,0.15);

            padding: 15px;

        }

        .input-box {

            width: 90px;

            min-width: 90px;

            height: 85px;

            background:
                #07172f;

            border:
                2px solid rgba(0,180,255,0.25);

            border-radius: 22px;

            color: white;

            font-size: 26px;

            text-align: center;

            outline: none;

            transition: 0.25s;

            box-shadow:
                inset 0 0 10px rgba(0,100,255,0.2);

        }

        .input-box:focus {

            border: 2px solid #00d5ff;

            box-shadow:
                0 0 20px rgba(0,220,255,0.7);

        }

        .result {

            background:
                #002e4f;

            color:
                #00ffff;

            font-weight: bold;

            text-shadow:
                0 0 10px cyan;

        }

        .calculate-btn {

            width: 100%;

            height: 90px;

            margin-top: 35px;

            border: none;

            border-radius: 25px;

            font-size: 42px;

            font-weight: bold;

            color: white;

            cursor: pointer;

            background:
                linear-gradient(
                    90deg,
                    #005eff,
                    #00a2ff
                );

            transition: 0.3s;

            box-shadow:
                0 0 25px rgba(0,180,255,0.5);

        }

        .calculate-btn:hover {

            transform: scale(1.02);

            box-shadow:
                0 0 40px rgba(0,220,255,0.8);

        }

        .footer {

            margin-top: 35px;

            text-align: center;

            color: #88dfff;

            font-size: 20px;

            letter-spacing: 3px;

            opacity: 0.8;

        }

        /* RESPONSIVE */

        @media(max-width: 900px) {

            h1 {
                font-size: 34px;
            }

            .row-label {

                font-size: 16px;

                width: 120px;

                padding: 10px;

            }

            th {
                font-size: 24px;
            }

            .input-box {

                width: 80px;

                min-width: 80px;

                height: 70px;

                font-size: 22px;

            }

            .calculate-btn {

                height: 70px;

                font-size: 30px;

            }

        }

        /* MODO VERTICAL */

        @media screen and (orientation: portrait) {

            .container {
                padding: 20px;
            }

            table {
                border-spacing: 10px;
            }

            .input-box {

                width: 85px;

                min-width: 85px;

                height: 78px;

                font-size: 22px;

            }

            .row-label {

                font-size: 14px;

                width: 110px;

            }

            h1 {

                font-size: 28px;

            }

        }

    </style>

</head>

<body>

    <div class="container">

        <img src="ersa_logo.png" class="logo">

        <h1>CALCULADORA DE OFFSETS</h1>

        <table>

            <tr>
                <th></th>
                <th>X</th>
                <th>Y</th>
                <th>Z</th>
            </tr>

            <tr>

                <td class="row-label">
                    VALOR SET
                </td>

                <td>
                    <input class="input-box"
                        id="setx"
                        type="number"
                        step="0.001"
                        value="40">
                </td>

                <td>
                    <input class="input-box"
                        id="sety"
                        type="number"
                        step="0.001"
                        value="45">
                </td>

                <td>
                    <input class="input-box"
                        id="setz"
                        type="number"
                        step="0.001"
                        value="7">
                </td>

            </tr>

            <tr>

                <td class="row-label">
                    VALOR ACTUAL
                </td>

                <td>
                    <input class="input-box"
                        id="actualx"
                        type="number"
                        step="0.001">
                </td>

                <td>
                    <input class="input-box"
                        id="actualy"
                        type="number"
                        step="0.001">
                </td>

                <td>
                    <input class="input-box"
                        id="actualz"
                        type="number"
                        step="0.001">
                </td>

            </tr>

            <tr>

                <td class="row-label">
                    OFFSET ACTUAL
                </td>

                <td>
                    <input class="input-box"
                        id="offsetx"
                        type="number"
                        step="0.001">
                </td>

                <td>
                    <input class="input-box"
                        id="offsety"
                        type="number"
                        step="0.001">
                </td>

                <td>
                    <input class="input-box"
                        id="offsetz"
                        type="number"
                        step="0.001">
                </td>

            </tr>

            <tr>

                <td class="row-label">
                    NUEVO OFFSET
                </td>

                <td>
                    <input class="input-box result"
                        id="newx"
                        readonly>
                </td>

                <td>
                    <input class="input-box result"
                        id="newy"
                        readonly>
                </td>

                <td>
                    <input class="input-box result"
                        id="newz"
                        readonly>
                </td>

            </tr>

        </table>

        <button class="calculate-btn"
            onclick="calculate()">

            CALCULAR

        </button>

        <div class="footer">
            KMX
        </div>

    </div>

    <script>

        function calculate() {

            let sx = parseFloat(document.getElementById("setx").value) || 0;
            let sy = parseFloat(document.getElementById("sety").value) || 0;
            let sz = parseFloat(document.getElementById("setz").value) || 0;

            let ax = parseFloat(document.getElementById("actualx").value) || 0;
            let ay = parseFloat(document.getElementById("actualy").value) || 0;
            let az = parseFloat(document.getElementById("actualz").value) || 0;

            let ox = parseFloat(document.getElementById("offsetx").value) || 0;
            let oy = parseFloat(document.getElementById("offsety").value) || 0;
            let oz = parseFloat(document.getElementById("offsetz").value) || 0;

            let nx = ox + (ax - sx);
            let ny = oy + (ay - sy);
            let nz = oz + (az - sz);

            document.getElementById("newx").value = nx.toFixed(3);
            document.getElementById("newy").value = ny.toFixed(3);
            document.getElementById("newz").value = nz.toFixed(3);

        }

    </script>

</body>

</html>
