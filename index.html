<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Offset Calculator</title>
<meta name="theme-color" content="#00152e">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest"
        href="manifest.json">

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {

            font-family: Arial, Helvetica, sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #00152e,
                    #004b8d
                );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 15px;

            overflow-x: hidden;

            color: white;

        }

        .container {

            width: 92%;

            max-width: 650px;

            margin-left: auto;

            margin-right: auto;

            background:
                rgba(5, 15, 35, 0.97);

            border-radius: 32px;

            padding: 22px;

            border:
                2px solid rgba(0, 180, 255, 0.2);

            box-shadow:
                0 0 40px rgba(0, 150, 255, 0.35);

        }

        .logo {

            display: block;

            margin: auto;

            width: 280px;

            max-width: 90%;

            margin-bottom: 25px;

            filter:
                drop-shadow(
                    0 0 15px rgba(0,200,255,0.7)
                );

        }

        h1 {

            text-align: center;

            font-size: 52px;

            margin-bottom: 40px;

            color: #66d9ff;

            letter-spacing: 3px;

            text-shadow:
                0 0 20px rgba(0,200,255,0.7);

        }

        table {

            width: 100%;

            border-spacing: 10px;

        }

        th {

            color: #78dcff;

            font-size: 34px;

            text-align: center;

        }

        .row-label {

            width: 120px;

            background:
                rgba(0, 30, 60, 0.8);

            border-radius: 22px;

            text-align: center;

            font-size: 18px;

            font-weight: bold;

            color: #7fe8ff;

            border:
                2px solid rgba(0, 180, 255, 0.2);

            box-shadow:
                0 0 15px rgba(0,150,255,0.15);

            padding: 10px;

        }

        .input-box {

            width: 72px;

            min-width: 72px;

            height: 72px;

            background:
                #07172f;

            border:
                2px solid rgba(0,180,255,0.25);

            border-radius: 22px;

            color: white;

            font-size: 20px;

            text-align: center;

            outline: none;

            transition: 0.25s;

            box-shadow:
                inset 0 0 10px rgba(0,100,255,0.2);

        }

        .input-box:focus {

            border:
                2px solid #00d5ff;

            box-shadow:
                0 0 20px rgba(0,220,255,0.7);

        }

        .result {

            background:
                #002e4f;

            color:
                #00ffff;

            font-weight: bold;

            text-shadow:
                0 0 10px cyan;

        }

        .calculate-btn {

            width: 100%;

            height: 85px;

            margin-top: 30px;

            border: none;

            border-radius: 25px;

            font-size: 38px;

            font-weight: bold;

            color: white;

            cursor: pointer;

            background:
                linear-gradient(
                    90deg,
                    #005eff,
                    #00a2ff
                );

            transition: 0.3s;

            box-shadow:
                0 0 25px rgba(0,180,255,0.5);

        }

        .calculate-btn:hover {

            transform: scale(1.02);

            box-shadow:
                0 0 40px rgba(0,220,255,0.8);

        }

        .footer {

            margin-top: 28px;

            text-align: center;

            color: #88dfff;

            font-size: 18px;

            letter-spacing: 4px;

            opacity: 0.8;

        }

        /* MOBILE */

        @media(max-width: 700px) {

            h1 {

                font-size: 30px;

                margin-bottom: 25px;

            }

            table {

                border-spacing: 8px;

            }

            .row-label {

                width: 95px;

                font-size: 12px;

                padding: 8px;

            }

            th {

                font-size: 22px;

            }

            .input-box {

                width: 64px;

                min-width: 64px;

                height: 64px;

                font-size: 18px;

            }

            .calculate-btn {

                height: 70px;

                font-size: 28px;

            }

        }

    </style>

</head>

<body>

    <div class="container">

        <img src="ersa_logo.png"
            class="logo">

        <h1>OFFSET CALCULATOR</h1>

        <table>

            <tr>

                <th></th>

                <th>X</th>

                <th>Y</th>

                <th>Z</th>

            </tr>

            <!-- SET VALUE -->

            <tr>

                <td class="row-label">

                    SET VALUE

                </td>

                <td>

                    <input class="input-box"
                        id="setx"
                        type="number"
                        step="0.1"
                        value="40">

                </td>

                <td>

                    <input class="input-box"
                        id="sety"
                        type="number"
                        step="0.1"
                        value="45">

                </td>

                <td>

                    <input class="input-box"
                        id="setz"
                        type="number"
                        step="0.1"
                        value="7">

                </td>

            </tr>

            <!-- ACTUAL VALUE -->

            <tr>

                <td class="row-label">

                    ACTUAL VALUE

                </td>

                <td>

                    <input class="input-box"
                        id="actualx"
                        type="number"
                        step="0.1">

                </td>

                <td>

                    <input class="input-box"
                        id="actualy"
                        type="number"
                        step="0.1">

                </td>

                <td>

                    <input class="input-box"
                        id="actualz"
                        type="number"
                        step="0.1">

                </td>

            </tr>

            <!-- ACTUAL OFFSET -->

            <tr>

                <td class="row-label">

                    ACTUAL OFFSET

                </td>

                <td>

                    <input class="input-box"
                        id="offsetx"
                        type="number"
                        step="0.1">

                </td>

                <td>

                    <input class="input-box"
                        id="offsety"
                        type="number"
                        step="0.1">

                </td>

                <td>

                    <input class="input-box"
                        id="offsetz"
                        type="number"
                        step="0.1">

                </td>

            </tr>

            <!-- NEW OFFSET -->

            <tr>

                <td class="row-label">

                    NEW OFFSET

                </td>

                <td>

                    <input class="input-box result"
                        id="newx"
                        readonly
                        value="0.0">

                </td>

                <td>

                    <input class="input-box result"
                        id="newy"
                        readonly
                        value="0.0">

                </td>

                <td>

                    <input class="input-box result"
                        id="newz"
                        readonly
                        value="0.0">

                </td>

            </tr>

        </table>

        <button class="calculate-btn"
            onclick="calculate()">

            CALCULATE

        </button>

        <div class="footer">

            KMX

        </div>

    </div>

    <script>

        function getValue(id) {

            let value =
                parseFloat(
                    document.getElementById(id).value
                );

            return isNaN(value) ? 0 : value;

        }

        function calculate() {

            let sx = getValue("setx");
            let sy = getValue("sety");
            let sz = getValue("setz");

            let ax = getValue("actualx");
            let ay = getValue("actualy");
            let az = getValue("actualz");

            let ox = getValue("offsetx");
            let oy = getValue("offsety");
            let oz = getValue("offsetz");

            /* ORIGINAL ERSA FORMULA */

            let nx = ox + (sx - ax);

            let ny = oy + (sy - ay);

            let nz = oz + (sz - az);

            document.getElementById("newx").value =
                nx.toFixed(1);

            document.getElementById("newy").value =
                ny.toFixed(1);

            document.getElementById("newz").value =
                nz.toFixed(1);

        }

    </script>

</body>

</html>
